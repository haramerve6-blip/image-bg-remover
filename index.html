<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Background Remover</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 {
      font-size: 24px;
      color: #333;
      margin-bottom: 30px;
    }
    .container {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 1200px;
      width: 100%;
    }
    .preview-box {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
      flex: 1;
      min-width: 300px;
    }
    .preview-box h2 {
      font-size: 16px;
      color: #666;
      margin-bottom: 15px;
    }
    .preview-box img {
      max-width: 100%;
      max-height: 400px;
      border-radius: 8px;
      background: repeating-conic-gradient(#ccc 0% 25%, #fff 0% 50%) 50% / 20px 20px;
    }
    .placeholder {
      width: 100%;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f0f0;
      border-radius: 8px;
      color: #999;
    }
    .upload-area {
      width: 100%;
      max-width: 500px;
      margin: 0 auto 40px;
      text-align: center;
    }
    .upload-btn {
      display: inline-block;
      padding: 12px 24px;
      background: #0066ff;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.2s;
    }
    .upload-btn:hover {
      background: #0055dd;
    }
    input[type="file"] {
      display: none;
    }
    .loader {
      display: none;
      text-align: center;
      padding: 20px;
    }
    .loader.active {
      display: block;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #f0f0f0;
      border-top-color: #0066ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .download-btn {
      display: none;
      margin-top: 15px;
      padding: 10px 20px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .download-btn.visible {
      display: inline-block;
    }
    .error {
      color: #dc3545;
      margin-top: 10px;
      font-size: 14px;
      display: none;
    }
    .error.visible {
      display: block;
    }
    .info {
      margin-top: 20px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <h1>Image Background Remover</h1>

  <div class="upload-area">
    <label class="upload-btn">
      Choose Image
      <input type="file" id="imageInput" accept="image/jpeg,image/png,image/webp">
    </label>
    <p class="info">JPG, PNG, WebP · Max 10MB</p>
    <div class="loader" id="loader">
      <div class="spinner"></div>
      <p>Removing background...</p>
    </div>
    <p class="error" id="error"></p>
  </div>

  <div class="container">
    <div class="preview-box">
      <h2>Original</h2>
      <div class="placeholder" id="originalPlaceholder">No image</div>
      <img id="originalPreview" style="display:none" alt="Original">
    </div>
    <div class="preview-box">
      <h2>Result</h2>
      <div class="placeholder" id="resultPlaceholder">Result will appear here</div>
      <img id="resultPreview" style="display:none" alt="Result">
      <button class="download-btn" id="downloadBtn">Download PNG</button>
    </div>
  </div>

  <script>
    const imageInput = document.getElementById('imageInput');
    const originalPreview = document.getElementById('originalPreview');
    const originalPlaceholder = document.getElementById('originalPlaceholder');
    const resultPreview = document.getElementById('resultPreview');
    const resultPlaceholder = document.getElementById('resultPlaceholder');
    const downloadBtn = document.getElementById('downloadBtn');
    const loader = document.getElementById('loader');
    const errorEl = document.getElementById('error');

    // Replace with your Cloudflare Worker URL
    const WORKER_URL = 'https://image-bg-remover.your-account.workers.dev';

    let currentResultBlob = null;

    imageInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      // Validate
      if (file.size > 10 * 1024 * 1024) {
        showError('File too large. Max 10MB.');
        return;
      }
      if (!['image/jpeg', 'image/png', 'image/webp'].includes(file.type)) {
        showError('Unsupported format. Use JPG, PNG or WebP.');
        return;
      }

      // Show original
      originalPreview.src = URL.createObjectURL(file);
      originalPreview.style.display = 'block';
      originalPlaceholder.style.display = 'none';

      // Reset result
      resultPreview.style.display = 'none';
      resultPlaceholder.style.display = 'flex';
      downloadBtn.classList.remove('visible');
      errorEl.classList.remove('visible');
      currentResultBlob = null;

      // Process
      loader.classList.add('active');

      try {
        const formData = new FormData();
        formData.append('image_file', file);

        const response = await fetch(WORKER_URL, {
          method: 'POST',
          body: formData,
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error || 'Processing failed');
        }

        currentResultBlob = await response.blob();
        const resultUrl = URL.createObjectURL(currentResultBlob);
        resultPreview.src = resultUrl;
        resultPreview.style.display = 'block';
        resultPlaceholder.style.display = 'none';
        downloadBtn.classList.add('visible');

      } catch (err) {
        showError(err.message);
      } finally {
        loader.classList.remove('active');
      }
    });

    downloadBtn.addEventListener('click', () => {
      if (!currentResultBlob) return;
      const url = URL.createObjectURL(currentResultBlob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'removed-bg.png';
      a.click();
      URL.revokeObjectURL(url);
    });

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.add('visible');
    }
  </script>
</body>
</html>
